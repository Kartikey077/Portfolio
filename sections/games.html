<section id="games" class="full-section games-section">
    <div class="container">
        <div class="section-title">
            <h2><i class="fas fa-gamepad"></i> My Games</h2>
            <div class="title-underline"></div>
        </div>
        <div class="games-grid">
            <div class="game-card">
                <div class="game-icon">
                    <i class="fas fa-user-secret" style="color: #4169E1"></i>
                </div>
                <h3>Personality Quiz</h3>
                <p>Answer 3 questions and discover which superhero you are! Iron Man, Hulk, or Batman?</p>
                <button class="play-btn" onclick="window.loadGame('personality-quiz')">
                    <i class="fas fa-play"></i> Take Quiz
                </button>
            </div>
        </div>
    </div>
</section>
