<!-- JAVASCRIPT                                   -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="script.js"></script>
<!-- Scroll Progress Bar Script -->
<script>
// Scroll progress bar
window.addEventListener('scroll', () => {
    const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
    const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    const scrolled = (winScroll / height) * 100;
    const progressBar = document.getElementById('scrollProgress');
    if (progressBar) {
        progressBar.style.width = scrolled + '%';
    }
});
</script>
<!-- Dragon Animation Enhancement Script -->
<script>
// Additional dragon effects - title highlight when dragon passes
const mainDragon = document.getElementById('mainDragon');
const headerTitle = document.getElementById('headerTitle');

if (mainDragon && headerTitle) {
    // Create Chinese magic particles
    function createMagicParticle() {
        const magicDiv = document.createElement('div');
        const chineseChars = ['龍', '福', '吉', '祥', '运', '财', '乐', '安'];
        const randomChar = chineseChars[Math.floor(Math.random() * chineseChars.length)];
        magicDiv.className = 'dragon-magic';
        magicDiv.textContent = randomChar;
        magicDiv.style.position = 'absolute';
        magicDiv.style.pointerEvents = 'none';
        magicDiv.style.zIndex = '30';
        magicDiv.style.fontSize = (Math.random() * 20 + 15) + 'px';
        magicDiv.style.color = ['#ffd700', '#ff9900', '#ff6600', '#ff3300'][Math.floor(Math.random() * 4)];
        
        // Position around the title
        const titleRect = headerTitle.getBoundingClientRect();
        const containerRect = document.querySelector('.upperheader').getBoundingClientRect();
        
        magicDiv.style.left = (titleRect.left - containerRect.left + Math.random() * titleRect.width) + 'px';
        magicDiv.style.top = (Math.random() * 60 + 10) + 'px';
        magicDiv.style.animation = 'magicAppear 0.6s ease-out forwards';
        
        document.querySelector('.upperheader').appendChild(magicDiv);
        
        setTimeout(() => {
            magicDiv.remove();
        }, 600);
    }
    
    // Listen for dragon animation using IntersectionObserver or time-based
    let lastHighlight = 0;
    
    // Add glow to title when dragon is near (triggered by JavaScript)
    setInterval(() => {
        // Simulate dragon passing effect every 10 seconds (matches animation duration)
        const now = Date.now();
        if (now - lastHighlight > 9800) { // Just before dragon completes circle
            lastHighlight = now;
            headerTitle.classList.add('title-highlight');
            
            // Create particles around title
            for (let i = 0; i < 8; i++) {
                setTimeout(() => createMagicParticle(), i * 50);
            }
            
            setTimeout(() => {
                headerTitle.classList.remove('title-highlight');
            }, 500);
        }
    }, 100);
}

// Log dragon animation ready
console.log('🐉 Large Chinese Dragon is circling the title!');
</script>
