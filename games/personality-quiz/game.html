<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="game.css">
</head>
<body>
    <div class="quiz-container">
        <div class="quiz-header">
            <i class="fas fa-terminal"></i>
            <h2>🐍 Personality Quiz Game</h2>
            <div class="api-status" id="apiStatus">
                <i class="fas fa-circle-notch fa-spin"></i> Connecting to Python Backend...
            </div>
        </div>
        <div class="quiz-content" id="quizContent">
            <div class="loading-console">
                <i class="fas fa-spinner fa-pulse"></i> Loading Python-powered quiz...
            </div>
        </div>
        <div id="result"></div>
    </div>
    <!-- No script tag here - it's loaded dynamically -->
</body>
</html>
